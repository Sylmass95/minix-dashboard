<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minix Dashboard — Connexion</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23161b22'/><rect x='20' y='25' rx='4' width='60' height='10' fill='%2358a6ff'/><rect x='20' y='45' rx='4' width='40' height='10' fill='%237ee787'/><rect x='20' y='65' rx='4' width='50' height='10' fill='%23d2a8ff'/></svg>">
<style>
  :root, [data-theme="dark"] {
    --bg: #0f1117; --bg-card: #161b22; --border: #21262d;
    --text: #e1e4e8; --text-muted: #8b949e; --link: #58a6ff;
  }
  [data-theme="light"] {
    --bg: #f6f8fa; --bg-card: #ffffff; --border: #d0d7de;
    --text: #1f2328; --text-muted: #656d76; --link: #0969da;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .login-box {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem 2rem; width: 340px;
    text-align: center;
  }
  .login-box h1 { font-size: 1.3rem; margin-bottom: .4rem; }
  .login-box p { font-size: .85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
  .login-box input {
    width: 100%; padding: .7rem 1rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 1.1rem; text-align: center;
    letter-spacing: .3em; outline: none;
    font-family: "SF Mono","Fira Code",monospace;
  }
  .login-box input:focus { border-color: var(--link); }
  .login-box button {
    width: 100%; margin-top: 1rem; padding: .7rem;
    border: none; border-radius: 8px; background: #238636;
    color: #fff; font-size: .95rem; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .login-box button:hover { opacity: .85; }
  .error {
    color: #f87171; font-size: .82rem; margin-top: .8rem;
  }
  @media (max-width: 380px) {
    .login-box { width: 90%; padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>
<div class="login-box">
  <h1>Minix Dashboard</h1>
  <p>Entrez le code d'accès</p>
  <form method="POST" action="/login">
    <input type="password" name="pin" placeholder="••••" autofocus autocomplete="off" maxlength="20">
    <button type="submit">Connexion</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </form>
</div>
<script>
  const saved = localStorage.getItem("dashboard-theme") || "dark";
  document.documentElement.setAttribute("data-theme", saved);
</script>
</body>
</html>
