<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minix Dashboard</title>
<style>
  :root, [data-theme="dark"] {
    --bg: #0f1117; --bg-card: #161b22; --bg-panel: #0d1117;
    --border: #21262d; --border-hover: #388bfd;
    --text: #e1e4e8; --text-muted: #8b949e; --text-footer: #484f58;
    --text-code: #c9d1d9; --text-log: #9ca3af;
    --sha: #d2a8ff; --ver-date: #7ee787; --link: #58a6ff;
    --btn-bg: #30363d; --btn-env-text: #d2a8ff;
    --overlay-bg: rgba(0,0,0,.7);
    --engine-inactive-bg: #21262d; --engine-inactive-text: #8b949e;
    --dot-green: #3fb950; --dot-red: #da3633; --dot-yellow: #d29922; --dot-grey: #8b949e;
    --toggle-bg: #30363d; --toggle-icon: "☀️";
  }
  [data-theme="light"] {
    --bg: #f6f8fa; --bg-card: #ffffff; --bg-panel: #f0f3f6;
    --border: #d0d7de; --border-hover: #0969da;
    --text: #1f2328; --text-muted: #656d76; --text-footer: #8c959f;
    --text-code: #32383f; --text-log: #57606a;
    --sha: #8250df; --ver-date: #1a7f37; --link: #0969da;
    --btn-bg: #e1e4e8; --btn-env-text: #8250df;
    --overlay-bg: rgba(0,0,0,.45);
    --engine-inactive-bg: #e1e4e8; --engine-inactive-text: #656d76;
    --dot-green: #1a7f37; --dot-red: #cf222e; --dot-yellow: #bf8700; --dot-grey: #8c959f;
    --toggle-bg: #d0d7de; --toggle-icon: "🌙";
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    transition: background .25s, color .25s;
  }
  header {
    padding: 1.5rem 2rem; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.4rem; font-weight: 600; line-height: 1.2; }
  .dashboard-version { font-size: .72rem; color: var(--text-muted); font-weight: 400; margin-top: .15rem; }
  .dashboard-version .sha { color: var(--sha); }
  .dashboard-version .ver-date { color: var(--ver-date); }
  .header-actions { display: flex; gap: .75rem; align-items: center; }
  .btn {
    border: none; border-radius: 8px; padding: .5rem 1rem;
    font-size: .85rem; font-weight: 500; cursor: pointer;
    transition: opacity .15s; display: inline-flex; align-items: center; gap: .4rem;
  }
  .btn:hover { opacity: .85; }
  .btn-update { background: #238636; color: #fff; }
  .btn-portainer { background: #1f6feb; color: #fff; text-decoration: none; }
  .btn-restart { background: var(--dot-yellow); color: #fff; }
  .btn-stop { background: var(--dot-red); color: #fff; }
  .btn-start { background: #238636; color: #fff; }
  .btn-logs { background: var(--btn-bg); color: var(--text); }
  .btn-env { background: var(--btn-bg); color: var(--btn-env-text); }
  .btn-link { background: var(--btn-bg); color: var(--link); text-decoration: none; }
  .btn-save { background: #238636; color: #fff; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-theme {
    background: var(--toggle-bg); color: var(--text); font-size: 1.1rem;
    width: 36px; height: 36px; padding: 0; display: flex;
    align-items: center; justify-content: center; border-radius: 50%;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    cursor: pointer; user-select: none;
  }
  main { padding: 1.5rem 2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.2rem; display: grid; grid-row: span 5;
    grid-template-rows: subgrid; row-gap: .6rem;
    transition: border-color .2s, background .25s;
  }
  .card:hover { border-color: var(--border-hover); }
  .card.system { opacity: .6; }
  .card-header { display: flex; align-items: center; justify-content: space-between; }
  .card-name { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot.running { background: var(--dot-green); box-shadow: 0 0 6px color-mix(in srgb, var(--dot-green) 50%, transparent); }
  .dot.online { background: var(--dot-green); box-shadow: 0 0 6px color-mix(in srgb, var(--dot-green) 50%, transparent); }
  .dot.exited, .dot.stopped, .dot.offline { background: var(--dot-red); }
  .dot.restarting { background: var(--dot-yellow); animation: pulse 1s infinite; }
  .dot.other { background: var(--dot-grey); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .card-status { font-size: .8rem; color: var(--text-muted); }
  .card-status .sha { font-family: "SF Mono","Fira Code",monospace; color: var(--sha); font-weight: 600; }
  .card-status .ver-date { color: var(--ver-date); }
  .card-actions { display: flex; flex-wrap: wrap; gap: .5rem; align-items: flex-end; }
  .card-actions .btn { font-size: .78rem; padding: .35rem .7rem; }
  .sleep-timer { font-size: .78rem; color: var(--text-muted); font-weight: 500; }
  .sleep-timer.paused { color: #f87171; }
  .card-stats {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
    padding: .6rem .8rem; font-size: .78rem; line-height: 1.6;
    display: grid; grid-template-columns: 1fr 1fr; gap: .2rem .8rem;
  }
  .card-stats .stat-label { color: var(--text-muted); }
  .card-stats .stat-value { color: var(--text); font-weight: 500; text-align: right; }
  .card-stats .stat-full { grid-column: 1 / -1; }
  .card-stats .stat-online { color: var(--dot-green); }
  .card-stats .stat-offline { color: var(--dot-red); }
  .engine-tag {
    display: inline-block; padding: .15rem .45rem; border-radius: 4px;
    font-size: .7rem; margin: .1rem; font-family: "SF Mono","Fira Code",monospace;
  }
  .engine-tag.active { background: #238636; color: #fff; }
  .engine-tag.inactive { background: var(--engine-inactive-bg); color: var(--engine-inactive-text); }
  .card-mini-logs {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
    padding: .5rem .7rem;
    font-family: "SF Mono","Fira Code",Consolas,monospace;
    font-size: .72rem; line-height: 1.5;
    white-space: pre-wrap; word-break: break-all;
    max-height: 150px; overflow-y: auto; color: var(--text-log);
  }
  .card-mini-logs .log-line { display: block; }
  .card-mini-logs .log-error { color: #f87171; }
  .card-mini-logs .log-warn { color: #fbbf24; }
  .card-mini-logs .log-info { color: #60a5fa; }
  .card-mini-logs .log-success { color: #34d399; }
  .section-title {
    font-size: .85rem; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .08em; margin: 1.5rem 0 .75rem; font-weight: 600;
  }
  .log-overlay,.update-overlay,.env-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--overlay-bg); z-index: 100;
    justify-content: center; align-items: center;
  }
  .log-overlay.open,.update-overlay.open,.env-overlay.open { display: flex; }
  .log-panel {
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 12px; width: 90%; max-width: 900px;
    max-height: 85vh; display: flex; flex-direction: column;
  }
  .log-header {
    padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .log-header h3 { font-size: 1rem; }
  .log-header .header-btns { display: flex; gap: .5rem; align-items: center; }
  .log-close { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
  .log-close:hover { color: var(--text); }
  .log-content {
    padding: 1rem; overflow-y: auto; flex: 1;
    font-family: "SF Mono","Fira Code",Consolas,monospace;
    font-size: .78rem; line-height: 1.6;
    white-space: pre-wrap; word-break: break-all; color: var(--text-code);
  }
  .env-editor {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .env-editor textarea {
    flex: 1; width: 100%; border: none; resize: none;
    background: var(--bg-panel); color: var(--text); padding: 1rem;
    font-family: "SF Mono","Fira Code",Consolas,monospace;
    font-size: .85rem; line-height: 1.8; outline: none;
    min-height: 400px;
  }
  .env-editor .env-tabs {
    display: flex; border-bottom: 1px solid var(--border);
  }
  .env-editor .env-tab {
    padding: .5rem 1rem; cursor: pointer; font-size: .8rem;
    color: var(--text-muted); border-bottom: 2px solid transparent;
  }
  .env-editor .env-tab.active { color: var(--link); border-bottom-color: var(--link); }
  footer {
    padding: 1rem 2rem; text-align: center; color: var(--text-footer);
    font-size: .78rem; border-top: 1px solid var(--border); margin-top: 2rem;
  }
  footer a { color: var(--link); text-decoration: none; }
  .spinner { display: inline-block; width: 14px; height: 14px;
    border: 2px solid transparent; border-top: 2px solid currentColor;
    border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 768px) {
    header { padding: 1rem 1.2rem; }
    main { padding: 1rem 1.2rem; }
    footer { padding: .8rem 1.2rem; }
  }
  @media (max-width: 600px) {
    header { flex-direction: column; gap: .75rem; text-align: center; padding: 1rem; }
    .header-actions { flex-wrap: nowrap; justify-content: center; gap: .5rem; }
    .header-actions .btn { font-size: .75rem; padding: .4rem .7rem; white-space: nowrap; }
    .btn-theme { width: 40px; height: 40px; font-size: 1.2rem; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    main { padding: .75rem; }
    .grid { grid-template-columns: 1fr; }
    .card { padding: 1rem; }
    .card-name { font-size: 1rem; }
    .card-actions .btn { font-size: .82rem; padding: .45rem .8rem; }
    .card-stats { font-size: .8rem; }
    .card-mini-logs { font-size: .74rem; max-height: 120px; }
    .log-panel { width: 100%; max-width: 100%; max-height: 100vh; border-radius: 0; }
    .log-content { font-size: .75rem; }
    .env-editor textarea { font-size: .78rem; min-height: 300px; }
    .section-title { margin: 1rem 0 .5rem; }
    footer { padding: .75rem 1rem; margin-top: 1rem; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Minix Dashboard</h1>
    <div class="dashboard-version" id="dashboardVersion"></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-update" onclick="runUpdate()" id="updateBtn">Mise à jour apps</button>
    <a class="btn btn-portainer" href="https://192.168.0.30:9443" target="_blank">Portainer</a>
    <button class="btn btn-theme" onclick="toggleTheme()" id="themeBtn" title="Changer le thème"></button>
  </div>
</header>
<main>
  <div class="section-title" id="servicesTitle" style="display:none">Services</div>
  <div class="grid" id="services"></div>
  <div class="section-title" id="homeTitle" style="display:none">Home</div>
  <div class="grid" id="home"></div>
  <div class="section-title" id="systemTitle" style="display:none">Système</div>
  <div class="grid" id="system"></div>
</main>

<div class="log-overlay" id="logOverlay" onclick="if(event.target===this)closeLogs()">
  <div class="log-panel">
    <div class="log-header">
      <h3 id="logTitle">Logs</h3>
      <button class="log-close" onclick="closeLogs()">&times;</button>
    </div>
    <div class="log-content" id="logContent">Chargement...</div>
  </div>
</div>

<div class="update-overlay" id="updateOverlay" onclick="if(event.target===this)closeUpdate()">
  <div class="log-panel">
    <div class="log-header">
      <h3>Mise à jour</h3>
      <button class="log-close" onclick="closeUpdate()">&times;</button>
    </div>
    <div class="log-content" id="updateContent"><span class="spinner"></span> Mise à jour en cours...</div>
  </div>
</div>

<div class="env-overlay" id="envOverlay" onclick="if(event.target===this)closeEnv()">
  <div class="log-panel" style="max-height:90vh;min-height:60vh;max-width:1000px">
    <div class="log-header">
      <h3 id="envTitle">.env</h3>
      <div class="header-btns">
        <button class="btn btn-save" id="envSaveBtn" onclick="saveEnv()">Enregistrer</button>
        <button class="btn btn-restart" id="envRestartBtn" onclick="restartFromEnv()" style="display:none">Restart</button>
        <button class="log-close" onclick="closeEnv()">&times;</button>
      </div>
    </div>
    <div class="env-editor" id="envEditor">
      <div class="env-tabs" id="envTabs"></div>
      <textarea id="envTextarea" spellcheck="false"></textarea>
    </div>
  </div>
</div>

<footer>
  Auto-refresh 10s &middot; <a href="https://192.168.0.30:9443" target="_blank">Portainer (avancé)</a>
</footer>

<script>
let refreshTimer;
let envData = { name: "", files: [] };
let envCurrentTab = 0;
let statsCache = {};

function initTheme() {
  const saved = localStorage.getItem("dashboard-theme") || "dark";
  document.documentElement.setAttribute("data-theme", saved);
  updateThemeBtn(saved);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("dashboard-theme", next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  document.getElementById("themeBtn").textContent = theme === "dark" ? "☀️" : "🌙";
}
initTheme();

const MOIS = ["janv.","fév.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function colorizeLogs(raw) {
  return raw.split("\n").map(line => {
    const e = escapeHtml(line);
    const l = line.toLowerCase();
    if (/error|exception|traceback|fatal|panic/i.test(l)) return `<span class="log-line log-error">${e}</span>`;
    if (/warn|warning/i.test(l)) return `<span class="log-line log-warn">${e}</span>`;
    if (/info|notice/i.test(l)) return `<span class="log-line log-info">${e}</span>`;
    if (/success|ok|ready|started|loaded|listening/i.test(l)) return `<span class="log-line log-success">${e}</span>`;
    return `<span class="log-line">${e}</span>`;
  }).join("\n");
}

function statusClass(s) {
  if (s === "running") return "running";
  if (s === "exited" || s === "dead") return "exited";
  if (s === "restarting") return "restarting";
  return "other";
}

function dateFR(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return `${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function gitDateFR(str) {
  if (!str) return "";
  const parts = str.trim().split(/[-\s:]/);
  if (parts.length < 5) return str;
  const m = parseInt(parts[1], 10) - 1;
  return `${parseInt(parts[2])} ${MOIS[m]} ${parts[0]} ${parts[3]}:${parts[4]}`;
}

function timeAgoFR(iso) {
  if (!iso) return "";
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return "à l'instant";
  if (m < 60) return `${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ${m % 60}m`;
  const j = Math.floor(h / 24);
  return `${j}j ${h % 24}h`;
}

function renderStats(name) {
  const s = statsCache[name];
  if (!s) return "";
  if (name === "web-video-downloader-1") {
    let sites = "";
    if (s.by_site && s.by_site.length) {
      sites = s.by_site.map(x => `<span class="engine-tag active">${x.domain} (${x.count})</span>`).join("");
      sites = `<span class="stat-full" style="margin-top:.3rem">Top sites : ${sites}</span>`;
    }
    return `<div class="card-stats">
      <span class="stat-label">yt-dlp</span><span class="stat-value">${s.ytdlp_version||"?"}</span>
      <span class="stat-label">Téléchargements</span><span class="stat-value">${s.downloads_active??0} en cours / ${s.total_downloads??0} au total</span>
      <span class="stat-label">Dernières 24h / 7j</span><span class="stat-value">${s.last_24h??"-"} / ${s.last_7d??"-"}</span>
      <span class="stat-label">Utilisateurs connectés</span><span class="stat-value">${s.active_users??0}</span>
      <span class="stat-label">Dossier downloads</span><span class="stat-value">${s.downloads_size||"?"}</span>
      ${sites}
    </div>`;
  }
  if (name === "voicebox") {
    const userStr = s.active_users != null ? `${s.active_users} actif(s) / ${s.users??"-"} total` : `${s.users??"-"} total`;
    const device = s.gpu_available ? "GPU" : "CPU";
    const machine = s.gpu_available ? "Sylmass95Render" : "Minix";
    return `<div class="card-stats">
      <span class="stat-label">Utilisateurs</span><span class="stat-value">${userStr}</span>
      <span class="stat-label">Générations totales</span><span class="stat-value">${s.generations??"-"}</span>
      <span class="stat-label">Rendus en cours</span><span class="stat-value">${s.active_generations??0}</span>
      <span class="stat-label">Rendu sur</span><span class="stat-value">${device} (${machine}) — ${s.model_size||"?"}</span>
    </div>`;
  }
  return "";
}

function renderRenderCard() {
  const s = statsCache["render"];
  if (!s) return "";
  const dot = s.online ? "online" : "offline";
  const status = s.online ? "En ligne" : "Éteint / Veille";
  let engines = "";
  if (s.supported_engines) {
    const loaded = s.engines_loaded || {};
    const keys = Array.isArray(s.supported_engines) ? s.supported_engines : Object.keys(s.supported_engines);
    engines = keys.map(e => {
      const isActive = e in loaded;
      return `<span class="engine-tag ${isActive?"active":"inactive"}">${e}</span>`;
    }).join("");
  }
  let gpuInfo = "";
  if (s.online && s.gpu_name) {
    gpuInfo = `<span class="stat-label">GPU</span><span class="stat-value">${s.gpu_name}</span>
      <span class="stat-label">VRAM</span><span class="stat-value">${s.vram_used||0} / ${s.vram_total||0} Go</span>`;
  }
  const paused = !!s.sleep_paused;
  const sleepRemain = s.sleep_remaining_min;
  const pauseClass = paused ? "btn-stop" : "btn-start";
  const pauseIcon = paused ? "⏸" : "▶";
  const pauseLabel = paused ? "Veille en pause" : "Mettre en pause";
  let sleepTag = "";
  if (s.online && sleepRemain != null && sleepRemain >= 0) {
    sleepTag = paused
      ? `<span class="sleep-timer paused">⏸ en pause</span>`
      : `<span class="sleep-timer">💤 ${sleepRemain} min</span>`;
  }
  const miniLogs = s.mini_logs ? `<div class="card-mini-logs">${colorizeLogs(s.mini_logs)}</div>` : `<div class="card-mini-logs"></div>`;
  const actions = [];
  if (s.online) {
    actions.push(`<button class="btn btn-logs" onclick="showRenderLogs()">Logs</button>`);
    actions.push(`<button class="btn btn-env" onclick="showRenderEnv()">.env</button>`);
    actions.push(`<button class="btn ${pauseClass}" onclick="toggleSleepPause(this)">${pauseIcon} ${pauseLabel}</button>`);
  } else {
    actions.push(`<button class="btn btn-start" onclick="wolRender(this)">Allumer (WOL)</button>`);
  }
  return `<div class="card" id="renderCard">
    <div class="card-header">
      <span class="card-name"><span class="dot ${dot}"></span>Sylmass95Render</span>
    </div>
    <div class="card-status">${status} &middot; dernière vue : ${s.last_seen||"jamais"}${s.version && s.version.sha ? ` &middot; <span class="sha">${s.version.sha}</span> <span class="ver-date">${gitDateFR(s.version.date)}</span>` : ""} ${sleepTag}</div>
    <div class="card-stats">
      <span class="stat-label">Hostname</span><span class="stat-value">${s.hostname||"-"}</span>
      ${gpuInfo}
      ${engines ? `<span class="stat-full" style="margin-top:.3rem">Engines : ${engines}</span>` : ""}
    </div>
    ${miniLogs}
    <div class="card-actions">${actions.join("")}</div>
  </div>`;
}

function renderCard(c) {
  const running = c.status === "running";
  const actions = [];
  if (c.url && running) actions.push(`<a class="btn btn-link" href="${c.url}" target="_blank">Ouvrir</a>`);
  actions.push(`<button class="btn btn-logs" onclick="showLogs('${c.name}','${c.display_name}')">Logs</button>`);
  if (c.has_env) actions.push(`<button class="btn btn-env" onclick="showEnv('${c.name}','${c.display_name}')">.env</button>`);
  if (running) {
    actions.push(`<button class="btn btn-restart" onclick="doAction('${c.name}','restart',this)">Restart</button>`);
    actions.push(`<button class="btn btn-stop" onclick="doAction('${c.name}','stop',this)">Stop</button>`);
  } else {
    actions.push(`<button class="btn btn-start" onclick="doAction('${c.name}','start',this)">Start</button>`);
  }
  const ver = c.version
    ? ` &middot; <span class="sha">${c.version.sha}</span> <span class="ver-date">${gitDateFR(c.version.date)}</span>`
    : "";
  const miniLogs = c.mini_logs ? `<div class="card-mini-logs">${colorizeLogs(c.mini_logs)}</div>` : `<div class="card-mini-logs"></div>`;
  const stats = renderStats(c.name) || `<div class="card-stats"></div>`;
  return `<div class="card${c.category==='system'?' system':''}">
    <div class="card-header">
      <span class="card-name"><span class="dot ${statusClass(c.status)}"></span>${c.display_name}</span>
    </div>
    <div class="card-status">${c.status}${c.health?' ('+c.health+')':''} &middot; up ${timeAgoFR(c.started_at)}${ver}</div>
    ${stats}
    ${miniLogs}
    <div class="card-actions">${actions.join("")}</div>
  </div>`;
}

async function loadStats() {
  try {
    const [vdl, vb, rnd] = await Promise.all([
      fetch("/api/stats/videodl").then(r=>r.json()).catch(()=>({})),
      fetch("/api/stats/voicebox").then(r=>r.json()).catch(()=>({})),
      fetch("/api/stats/render").then(r=>r.json()).catch(()=>({})),
    ]);
    statsCache["web-video-downloader-1"] = vdl;
    statsCache["voicebox"] = vb;
    statsCache["render"] = rnd;
  } catch(e) { console.error(e); }
}

async function loadContainers() {
  try {
    const res = await fetch("/api/containers");
    if (res.status === 401) { window.location.reload(); return; }
    const data = await res.json();
    const home = data.filter(c => c.category === "home");
    const services = data.filter(c => c.category === "services");
    const system = data.filter(c => c.category === "system");

    let servicesHtml = services.map(renderCard).join("");
    servicesHtml += renderRenderCard();
    document.getElementById("services").innerHTML = servicesHtml;
    document.getElementById("servicesTitle").style.display = (services.length||statsCache["render"]) ? "" : "none";
    document.getElementById("home").innerHTML = home.map(renderCard).join("");
    document.getElementById("homeTitle").style.display = home.length ? "" : "none";
    document.getElementById("system").innerHTML = system.map(renderCard).join("");
    document.getElementById("systemTitle").style.display = system.length ? "" : "none";
    document.querySelectorAll(".card-mini-logs").forEach(el => el.scrollTop = el.scrollHeight);
  } catch(e) { console.error(e); }
}

async function refresh() {
  await loadStats();
  await loadContainers();
}

async function toggleSleepPause(btn) {
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  try {
    await fetch("/api/render/sleep-pause", {method:"POST"});
  } catch(e) {}
  await loadStats();
  await loadContainers();
}

async function wolRender(btn) {
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Envoi...`;
  try {
    const res = await fetch("/api/render/wol", {method:"POST"});
    const data = await res.json();
    if (data.ok) {
      btn.innerHTML = "Paquet envoyé !";
      setTimeout(refresh, 5000);
    } else {
      btn.innerHTML = "Erreur";
    }
  } catch(e) { btn.innerHTML = "Erreur"; }
  setTimeout(() => { btn.disabled = false; btn.innerHTML = "Allumer (WOL)"; }, 8000);
}

async function doAction(name, action, btn) {
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  try { await fetch(`/api/containers/${name}/${action}`, {method:"POST"}); } catch(e){}
  setTimeout(refresh, 1500);
}

async function showLogs(name, displayName) {
  document.getElementById("logOverlay").classList.add("open");
  document.getElementById("logTitle").textContent = "Logs — " + displayName;
  document.getElementById("logContent").innerHTML = "Chargement...";
  try {
    const res = await fetch(`/api/containers/${name}/logs?tail=150`);
    const data = await res.json();
    document.getElementById("logContent").innerHTML = data.ok ? colorizeLogs(data.logs) : escapeHtml(data.error);
    const el = document.getElementById("logContent");
    el.scrollTop = el.scrollHeight;
  } catch(e) { document.getElementById("logContent").textContent = "Erreur: " + e.message; }
}
function closeLogs() { document.getElementById("logOverlay").classList.remove("open"); }

async function showRenderLogs() {
  document.getElementById("logOverlay").classList.add("open");
  document.getElementById("logTitle").textContent = "Logs — Sylmass95Render";
  document.getElementById("logContent").innerHTML = "Chargement...";
  try {
    const res = await fetch("/api/render/logs");
    const data = await res.json();
    document.getElementById("logContent").innerHTML = data.ok ? colorizeLogs(data.logs) : escapeHtml(data.error);
    const el = document.getElementById("logContent");
    el.scrollTop = el.scrollHeight;
  } catch(e) { document.getElementById("logContent").textContent = "Erreur: " + e.message; }
}

async function showEnv(name, displayName) {
  document.getElementById("envOverlay").classList.add("open");
  document.getElementById("envTitle").textContent = ".env — " + displayName;
  document.getElementById("envTextarea").value = "Chargement...";
  document.getElementById("envTabs").innerHTML = "";
  document.getElementById("envRestartBtn").style.display = "none";
  envData = { name, files: [] };
  envCurrentTab = 0;
  try {
    const res = await fetch(`/api/containers/${name}/env`);
    const data = await res.json();
    if (data.ok) {
      envData.files = data.files;
      renderEnvTabs();
    } else {
      document.getElementById("envTextarea").value = data.error || "Erreur";
    }
  } catch(e) { document.getElementById("envTextarea").value = "Erreur: " + e.message; }
}

function renderEnvTabs() {
  const tabs = document.getElementById("envTabs");
  tabs.innerHTML = envData.files.map((f, i) =>
    `<div class="env-tab${i===envCurrentTab?' active':''}" onclick="switchEnvTab(${i})">${f.name}</div>`
  ).join("");
  document.getElementById("envTextarea").value = envData.files[envCurrentTab]?.content || "";
}

function switchEnvTab(i) {
  envData.files[envCurrentTab].content = document.getElementById("envTextarea").value;
  envCurrentTab = i;
  renderEnvTabs();
}

async function saveEnv() {
  envData.files[envCurrentTab].content = document.getElementById("envTextarea").value;
  const btn = document.getElementById("envSaveBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  try {
    let res;
    if (envData.name === "__render__") {
      res = await fetch("/api/render/env", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ content: envData.files[0].content })
      });
    } else {
      res = await fetch(`/api/containers/${envData.name}/env`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ files: envData.files })
      });
    }
    const data = await res.json();
    if (data.ok) {
      btn.innerHTML = "Enregistré !";
      document.getElementById("envRestartBtn").style.display = "";
      document.getElementById("envRestartBtn").setAttribute("data-name", envData.name);
    } else {
      btn.innerHTML = "Erreur";
    }
  } catch(e) { btn.innerHTML = "Erreur"; }
  setTimeout(() => { btn.disabled = false; btn.innerHTML = "Enregistrer"; }, 2000);
}

async function restartFromEnv() {
  const name = document.getElementById("envRestartBtn").getAttribute("data-name");
  const btn = document.getElementById("envRestartBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  try {
    if (name === "__render__") {
      await fetch("/api/render/restart", {method:"POST"});
    } else {
      await fetch(`/api/containers/${name}/restart`, {method:"POST"});
    }
  } catch(e){}
  btn.innerHTML = "Redémarré !";
  setTimeout(() => { btn.style.display = "none"; btn.disabled = false; btn.innerHTML = "Restart"; }, 3000);
}

async function showRenderEnv() {
  document.getElementById("envOverlay").classList.add("open");
  document.getElementById("envTitle").textContent = ".env — Sylmass95Render";
  document.getElementById("envTextarea").value = "Chargement...";
  document.getElementById("envTabs").innerHTML = "";
  document.getElementById("envRestartBtn").style.display = "none";
  envData = { name: "__render__", files: [] };
  envCurrentTab = 0;
  try {
    const res = await fetch("/api/render/env");
    const data = await res.json();
    if (data.ok) {
      envData.files = data.files;
      renderEnvTabs();
    } else {
      document.getElementById("envTextarea").value = data.error || "Erreur";
    }
  } catch(e) { document.getElementById("envTextarea").value = "Erreur: " + e.message; }
}

function closeEnv() { document.getElementById("envOverlay").classList.remove("open"); }

async function runUpdate() {
  const btn = document.getElementById("updateBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> En cours...`;
  document.getElementById("updateOverlay").classList.add("open");
  document.getElementById("updateContent").innerHTML = `<span class="spinner"></span> Mise à jour en cours, patience...`;
  try {
    const res = await fetch("/api/update", {method:"POST"});
    const data = await res.json();
    let txt = "";
    if (data.stdout) txt += data.stdout;
    if (data.stderr) txt += "\n" + data.stderr;
    if (!txt.trim()) txt = data.ok ? "Terminé." : "Erreur.";
    document.getElementById("updateContent").innerHTML = colorizeLogs(txt);
  } catch(e) { document.getElementById("updateContent").textContent = "Erreur: " + e.message; }
  btn.disabled = false;
  btn.innerHTML = "Mise à jour apps";
  setTimeout(refresh, 3000);
}
function closeUpdate() { document.getElementById("updateOverlay").classList.remove("open"); }

refresh();
refreshTimer = setInterval(refresh, 10000);

(async function loadDashboardVersion() {
  try {
    const r = await fetch("/api/dashboard-version");
    const v = await r.json();
    if (v.sha) {
      document.getElementById("dashboardVersion").innerHTML =
        `<span class="sha">${v.sha}</span> <span class="ver-date">${gitDateFR(v.date)}</span>`;
    }
  } catch(e) {}
})();
</script>
